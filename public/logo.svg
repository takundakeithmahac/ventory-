  <circle cx="138" cy="88" r="28" fill="#1a75d2"/>
  <!-- Left arm mid-upper small dot -->
  <circle cx="162" cy="150" r="17" fill="#1a75d2"/>
  <!-- Left arm mid dot -->
  <circle cx="180" cy="200" r="15" fill="#1a75d2"/>
  <!-- Left arm lower dot -->
