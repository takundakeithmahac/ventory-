  <line x1="155" y1="200" x2="200" y2="255" stroke="#1a75d2" stroke-width="18" stroke-linecap="round"/>

  <!-- Right outer arm -->
  <line x1="490" y1="104" x2="322" y2="548" stroke="#1a75d2" stroke-width="22" stroke-linecap="round"/>
