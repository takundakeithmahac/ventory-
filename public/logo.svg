  <!-- Right arm upper-mid dot -->
  <circle cx="455" cy="172" r="18" fill="#1a75d2"/>
  <!-- Right arm mid dot -->
  <circle cx="430" cy="222" r="15" fill="#1a75d2"/>
  <!-- Right arm lower dot -->
  <circle cx="406" cy="272" r="14" fill="#1a75d2"/>

  <!-- Bottom junction — left dot -->
  <circle cx="278" cy="528" r="18" fill="#1a75d2"/>
  <!-- Bottom junction — right dot -->
  <circle cx="330" cy="532" r="18" fill="#1a75d2"/>
  <!-- Bottom center large dot -->
