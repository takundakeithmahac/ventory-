<svg viewBox="0 0 620 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left outer arm -->
  <line x1="138" y1="88" x2="298" y2="548" stroke="#1a75d2" stroke-width="22" stroke-linecap="round"/>
  <!-- Left inner arm -->
  <line x1="182" y1="148" x2="298" y2="548" stroke="#1a75d2" stroke-width="22" stroke-linecap="round"/>
  <!-- Cross brace on left -->
